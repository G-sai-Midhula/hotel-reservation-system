<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom px-4">
        <a class="navbar-brand" href="/">Hotel Reservation</a>
    </nav>

    <div class="auth-card">
        <h3 class="text-center mb-4">Welcome Back</h3>

        <p th:if="${error}" th:text="${error}" class="text-danger text-center"></p>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-gold w-100">Login</button>
        </form>

        <p class="text-center mt-3">Don't have an account? <a href="/signup">Sign up</a></p>
    </div>

</body>
</html>
