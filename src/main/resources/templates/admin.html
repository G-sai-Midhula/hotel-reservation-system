<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="/css/style.css" rel="stylesheet">
</head>
<body>

	<nav class="navbar navbar-expand-lg navbar-custom px-4">
	    <a class="navbar-brand" href="/">Hotel Reservation</a>
	    <div class="navbar-nav">
	        <a class="nav-link" href="/rooms">Rooms</a>
	        <a class="nav-link" href="/booking">Book a Room</a>
	        <a class="nav-link" href="/my-bookings">My Bookings</a>
	        <a class="nav-link" href="/admin">Admin</a>
	        <a class="nav-link" href="/login">Login</a>
			<a class="nav-link" href="/logout">Logout</a>
	    </div>
	</nav>
    <div class="container mt-5">
        <h1 class="mb-4">Admin Dashboard</h1>

        <div class="card p-4 mb-5" style="max-width: 500px;">
            <h4 class="mb-3">Add New Room</h4>
            <form th:action="@{/admin/add-room}" method="post">
                <div class="mb-3">
                    <label class="form-label">Room Type</label>
                    <input type="text" name="roomType" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Price</label>
                    <input type="number" step="0.01" name="price" class="form-control" required>
                </div>
				<div class="mb-3">
				    <label class="form-label">Description</label>
				    <input type="text" name="description" class="form-control"
				           placeholder="e.g. AC, King bed, City view">
				</div>
                <div class="mb-3">
                    <label class="form-label">Available</label>
                    <select name="available" class="form-select">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success">Add Room</button>
            </form>
        </div>

        <h4 class="mb-3">All Rooms</h4>
        <table class="table table-striped table-bordered mb-5">
            <thead class="table-dark">
                <tr>
                    <th>Room Type</th>
                    <th>Price</th>
                    <th>Available</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="room : ${rooms}">
                    <td th:text="${room.roomType}">Type</td>
                    <td th:text="${room.price}">Price</td>
                    <td th:text="${room.available}">Available</td>
                    <td>
                        <a th:href="@{/admin/delete-room/{id}(id=${room.id})}" class="btn btn-sm btn-danger">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <h4 class="mb-3">All Bookings</h4>
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Customer</th>
                    <th>Room</th>
                    <th>Check-In</th>
                    <th>Check-Out</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="${booking.customerName}">Name</td>
                    <td th:text="${booking.room.roomType}">Room</td>
                    <td th:text="${booking.checkInDate}">In</td>
                    <td th:text="${booking.checkOutDate}">Out</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
