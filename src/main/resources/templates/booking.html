<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book a Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="/css/style.css" rel="stylesheet">
</head>
<body>

	<nav class="navbar navbar-expand-lg navbar-custom px-4">
	    <a class="navbar-brand" href="/">Hotel Reservation</a>
	    <div class="navbar-nav">
	        <a class="nav-link" href="/rooms">Rooms</a>
	        <a class="nav-link" href="/booking">Book a Room</a>
	        <a class="nav-link" href="/my-bookings">My Bookings</a>
	        <a class="nav-link" href="/admin">Admin</a>
	        <a class="nav-link" href="/login">Login</a>
			<a class="nav-link" href="/logout">Logout</a>
	    </div>
	</nav>

    <div class="container mt-5" style="max-width: 500px;">
        <h1 class="mb-4">Book a Room</h1>

        <form th:action="@{/booking}" method="post">

            <div class="mb-3">
                <label class="form-label">Your Name</label>
                <input type="text" name="customerName" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Check-In Date</label>
                <input type="date" name="checkInDate" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Check-Out Date</label>
                <input type="date" name="checkOutDate" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Select Room</label>
                <select name="roomId" class="form-select" required>
                    <option th:each="room : ${rooms}"
                            th:value="${room.id}"
                            th:text="${room.roomType} + ' - ₹' + ${room.price}">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Book Now</button>
        </form>
    </div>

</body>
</html>
