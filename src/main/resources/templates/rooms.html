<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Available Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom px-4">
        <a class="navbar-brand" href="/">Hotel Reservation</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/rooms">Rooms</a>
            <a class="nav-link" href="/booking">Book a Room</a>
            <a class="nav-link" href="/my-bookings">My Bookings</a>
            <a class="nav-link" href="/admin">Admin</a>
            <a class="nav-link" href="/login">Login</a>
			<a class="nav-link" href="/logout">Logout</a>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="mb-4">Available Rooms</h1>

        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Room Type</th>
                    <th>Price</th>
                    <th>Rooms Available</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry : ${roomCounts}">
                    <td th:text="${entry.key}">Type</td>
                    <td th:text="${roomPrices.get(entry.key)}">Price</td>
                    <td>
                        <span class="badge bg-success" th:text="${entry.value} + ' available'">0</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
