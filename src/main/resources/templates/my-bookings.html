<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="/css/style.css" rel="stylesheet">
</head>
<body>

	<nav class="navbar navbar-expand-lg navbar-custom px-4">
	    <a class="navbar-brand" href="/">Hotel Reservation</a>
	    <div class="navbar-nav">
	        <a class="nav-link" href="/rooms">Rooms</a>
	        <a class="nav-link" href="/booking">Book a Room</a>
	        <a class="nav-link" href="/my-bookings">My Bookings</a>
	        <a class="nav-link" href="/admin">Admin</a>
	        <a class="nav-link" href="/login">Login</a>
	    </div>
	</nav>
    <div class="container mt-5">
        <h1 class="mb-4">All Bookings</h1>

        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Customer Name</th>
                    <th>Room Type</th>
                    <th>Check-In</th>
                    <th>Check-Out</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="${booking.customerName}">Name</td>
                    <td th:text="${booking.room.roomType}">Room</td>
                    <td th:text="${booking.checkInDate}">In</td>
                    <td th:text="${booking.checkOutDate}">Out</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
